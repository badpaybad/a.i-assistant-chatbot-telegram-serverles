  <script>
    // Global error handler for mobile debugging
    window.onerror = function(msg, url, line, col, error) {
      var debugDiv = document.getElementById('debug-error');
      if (!debugDiv) {
        debugDiv = document.createElement('div');
        debugDiv.id = 'debug-error';
        debugDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;padding:10px;z-index:10000;font-family:monospace;font-size:12px;word-break:break-all;';
        document.body.appendChild(debugDiv);
      }
      debugDiv.innerHTML = '<strong>JS Error:</strong> ' + msg + '<br>Line: ' + line + ' col: ' + col + '<br>URL: ' + url;
      console.error('GLOBAL ERROR:', msg, url, line);
    };
    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled Promise Rejection:', event.reason);
    });
  </script>
