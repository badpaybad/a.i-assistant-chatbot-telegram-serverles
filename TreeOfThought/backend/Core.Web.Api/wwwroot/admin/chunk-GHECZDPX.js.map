<nz-layout class="files-layout" [class.selection-mode]="selectionMode">
  <nz-sider nzWidth="280px" nzTheme="light" class="folder-sider">
    <app-folder-tree (folderSelected)="onFolderSelected($any($event))" (folderCreated)="onFolderCreated()"></app-folder-tree>
  </nz-sider>
  <nz-content class="explorer-content">
    <app-file-explorer 
      [selectedFolderId]="selectedFolderId" 
      [selectionMode]="selectionMode" 
      (fileSelected)="fileSelected.emit($event)"
      (folderCreated)="onFolderCreated()"
    ></app-file-explorer>
  </nz-content>
</nz-layout>
