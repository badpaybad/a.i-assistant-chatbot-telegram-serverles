services:
  redis:
    image: redis:7-alpine
    container_name: tot-redis
    command: redis-server --requirepass Test123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./db_test/redis:/data
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: tot-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Test123456
      POSTGRES_DB: tot_db
    ports:
      - "5432:5432"
    volumes:
      - ./db_test/postgres:/var/lib/postgresql/data
    restart: always

  mysql:
    image: mysql:8.0
    container_name: tot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test123456
      MYSQL_DATABASE: tot_db
    ports:
      - "3306:3306"
    volumes:
      - ./db_test/mysql:/var/lib/mysql
    restart: always

  mongodb:
    image: mongo:6.0
    container_name: tot-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: Test123456
    ports:
      - "27017:27017"
    volumes:
      - ./db_test/mongodb:/data/db
    restart: always

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tot-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Test123456
    ports:
      - "1433:1433"
    volumes:
      - ./db_test/mssql:/var/opt/mssql
    restart: always
