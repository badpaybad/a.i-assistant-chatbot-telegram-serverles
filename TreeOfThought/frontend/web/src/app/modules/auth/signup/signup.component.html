<div class="signup-page">
  <div class="signup-header">
    <h2>{{ 'Đăng ký' | translate }}</h2>
    <p>{{ 'Nhập thông tin của bạn để bắt đầu' | translate }}</p>
  </div>

  <form nz-form [formGroup]="validateForm" (ngSubmit)="$event.preventDefault(); submitForm()">
    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập tên đăng nhập!' | translate">
        <nz-input-group nzPrefixIcon="user">
          <input type="text" nz-input formControlName="username" [placeholder]="'Tên đăng nhập' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập email!' | translate">
        <nz-input-group nzPrefixIcon="mail">
          <input type="email" nz-input formControlName="email" [placeholder]="'Email' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập tên hiển thị!' | translate">
        <nz-input-group nzPrefixIcon="idcard">
          <input type="text" nz-input formControlName="displayName" [placeholder]="'Tên hiển thị' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập mật khẩu!' | translate">
        <nz-input-group nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="password" [placeholder]="'Mật khẩu' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng xác nhận mật khẩu mới!' | translate">
        <nz-input-group nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="confirmPassword" [placeholder]="'Xác nhận mật khẩu mới' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <button nz-button class="signup-form-button" [nzType]="'primary'" [nzLoading]="loading">{{ 'Đăng ký' | translate }}</button>
    {{ 'Đã có tài khoản?' | translate }} <a routerLink="/auth/login">{{ 'Đăng nhập' | translate }}</a>

    <nz-divider [nzText]="('Hoặc đăng nhập với' | translate)"></nz-divider>

    <div class="sso-buttons">
      <button nz-button nzType="default" (click)="signupWithGoogle()" [nzLoading]="loading">
        <span nz-icon nzType="google"></span> {{ 'Google' | translate }}
      </button>
      <button nz-button nzType="default" (click)="signupWithMS()" [nzLoading]="loading">
        <span nz-icon nzType="windows"></span> {{ 'Microsoft' | translate }}
      </button>
      <button nz-button nzType="default" (click)="signupWithFacebook()" [nzLoading]="loading">
        <span nz-icon nzType="facebook"></span> {{ 'Facebook' | translate }}
      </button>
    </div>
  </form>
</div>
