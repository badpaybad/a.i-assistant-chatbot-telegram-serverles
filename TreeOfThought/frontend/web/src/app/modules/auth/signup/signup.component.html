<div class="signup-page">
  <div class="signup-header">
    <h2>Sign Up</h2>
    <p>Create an account to get started</p>
  </div>

  <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your username!">
        <nz-input-group nzPrefixIcon="user">
          <input type="text" nz-input formControlName="username" placeholder="Username" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your email!">
        <nz-input-group nzPrefixIcon="mail">
          <input type="email" nz-input formControlName="email" placeholder="Email" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your Display Name!">
        <nz-input-group nzPrefixIcon="idcard">
          <input type="text" nz-input formControlName="displayName" placeholder="Display Name" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your Password!">
        <nz-input-group nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="password" placeholder="Password" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control nzErrorTip="Please confirm your Password!">
        <nz-input-group nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="confirmPassword" placeholder="Confirm Password" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <button nz-button class="signup-form-button" [nzType]="'primary'" [nzLoading]="loading">Sign Up</button>
    Already have an account? <a routerLink="/auth/login">Login here</a>

    <nz-divider nzText="Or sign up with"></nz-divider>

    <div class="sso-buttons">
      <button nz-button nzType="default" (click)="signupWithGoogle()" [nzLoading]="loading">
        <span nz-icon nzType="google"></span> Google
      </button>
      <button nz-button nzType="default" (click)="signupWithMS()" [nzLoading]="loading">
        <span nz-icon nzType="windows"></span> Microsoft
      </button>
      <button nz-button nzType="default" (click)="signupWithFacebook()" [nzLoading]="loading">
        <span nz-icon nzType="facebook"></span> Facebook
      </button>
    </div>
  </form>
</div>
