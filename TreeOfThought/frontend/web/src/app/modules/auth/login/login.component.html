<div class="login-page">
  <div class="login-header">
    <h2>{{ 'Đăng nhập' | translate }}</h2>
    <p>{{ 'Nhập thông tin của bạn để truy cập hệ thống' | translate }}</p>
  </div>

  <form nz-form [formGroup]="validateForm" (ngSubmit)="$event.preventDefault(); submitForm()">
    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập tên đăng nhập!' | translate">
        <nz-input-group nzPrefixIcon="user">
          <input type="text" nz-input formControlName="username" [placeholder]="'Tên đăng nhập' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control [nzErrorTip]="'Vui lòng nhập mật khẩu!' | translate">
        <nz-input-group nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="password" [placeholder]="'Mật khẩu' | translate" />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>

    <div nz-row class="login-form-margin">
      <div nz-col [nzSpan]="12">
        <label nz-checkbox formControlName="remember">
          <span>{{ 'Ghi nhớ tôi' | translate }}</span>
        </label>
      </div>
      <div nz-col [nzSpan]="12" class="text-right">
        <a class="login-form-forgot">{{ 'Quên mật khẩu' | translate }}</a>
      </div>
    </div>

    <button nz-button nzHtmlType="submit" class="login-form-button login-form-margin" [nzType]="'primary'" [nzLoading]="loading">
      {{ 'Đăng nhập' | translate }}
    </button>
    
    <button nz-button type="button" class="login-form-button" (click)="fillAdmin()">{{ 'Tự động nhập Admin (thử nghiệm)' | translate }}</button>
    
    <div class="register-link">
      {{ 'Hoặc' | translate }} <a routerLink="/auth/signup">{{ 'Đăng ký ngay!' | translate }}</a>
    </div>
  </form>

  <nz-divider [nzText]="('Hoặc đăng nhập với' | translate)"></nz-divider>

  <div class="sso-buttons">
    <button nz-button nzBlock type="button" (click)="loginWithGoogle()">
      <span nz-icon nzType="google"></span> {{ 'Google' | translate }}
    </button>
    <button nz-button nzBlock type="button" (click)="loginWithMS()">
      <span nz-icon nzType="windows"></span> {{ 'Microsoft' | translate }}
    </button>
    <button nz-button nzBlock type="button" (click)="loginWithFacebook()">
      <span nz-icon nzType="facebook"></span> {{ 'Facebook' | translate }}
    </button>
  </div>
</div>
