<div class="explorer-container">
  <div class="explorer-toolbar">
    <div class="toolbar-left">
      <nz-breadcrumb>
        <nz-breadcrumb-item>
          <a (click)="navigateToFolder(null)">
            <span nz-icon nzType="home"></span> Tài liệu của tôi
          </a>
        </nz-breadcrumb-item>
        <nz-breadcrumb-item *ngFor="let item of breadcrumbs">
          <a (click)="navigateToFolder(item.id)">{{ item.name }}</a>
        </nz-breadcrumb-item>
      </nz-breadcrumb>
    </div>
    <div class="toolbar-right">
      <button nz-button nzType="primary" (click)="fileInput.click()" [disabled]="!selectedFolderId" style="margin-right: 8px">
        <span nz-icon nzType="upload"></span> Tải lên
      </button>
      <input #fileInput type="file" style="display: none" (change)="onUpload($event)">
      
      <button nz-button nzType="default" (click)="loadContent()">
        <span nz-icon nzType="reload"></span> Làm mới
      </button>
    </div>
  </div>

  <nz-table 
    #basicTable 
    [nzData]="files" 
    [nzLoading]="loading" 
    nzSize="middle"
    [nzFrontPagination]="false"
    [nzTotal]="total"
    [nzPageIndex]="pageIndex"
    [nzPageSize]="pageSize"
    (nzPageIndexChange)="onPageIndexChange($event)"
    (nzPageSizeChange)="onPageSizeChange($event)"
  >
    <thead>
      <tr>
        <th nzWidth="40px"></th>
        <th>Tên</th>
        <th>Kích thước</th>
        <th>Loại</th>
        <th>Ngày tạo</th>
        <th nzWidth="150px">Hành động</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let folder of folders">
        <td><span nz-icon nzType="folder" nzTheme="fill" style="color: #ffca28"></span></td>
        <td><a (click)="selectedFolderId = folder.id; loadContent()">{{ folder.name }}</a></td>
        <td>--</td>
        <td>Thư mục</td>
        <td>--</td>
        <td>
          <button nz-button nzType="text" nzDanger (click)="deleteFolder(folder.id)">
            <span nz-icon nzType="delete"></span>
          </button>
        </td>
      </tr>
      <tr *ngFor="let file of files">
        <td><span nz-icon nzType="file" nzTheme="outline" style="color: #1890ff"></span></td>
        <td><a [href]="file.url" target="_blank">{{ file.name }}</a></td>
        <td>{{ formatSize(file.size) }}</td>
        <td>{{ file.mimeType }}</td>
        <td>{{ file.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <div class="action-buttons">
            <a nz-button nzType="text" [href]="file.url" target="_blank" nz-tooltip nzTooltipTitle="Tải về">
              <span nz-icon nzType="download"></span>
            </a>
            <button nz-button nzType="text" (click)="openShareModal(file)" nz-tooltip nzTooltipTitle="Chia sẻ">
              <span nz-icon nzType="share-alt"></span>
            </button>
            <button nz-button nzType="text" nzDanger (click)="deleteFile(file.id)" nz-tooltip nzTooltipTitle="Xóa">
              <span nz-icon nzType="delete"></span>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>
