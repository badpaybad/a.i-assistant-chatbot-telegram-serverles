<div class="change-password-container">
  <nz-card [nzTitle]="'Đổi mật khẩu' | translate">
    <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
      <nz-form-item>
        <nz-form-label [nzSpan]="6" nzRequired>{{ 'Mật khẩu cũ' | translate }}</nz-form-label>
        <nz-form-control [nzSpan]="14" [nzErrorTip]="'Vui lòng nhập mật khẩu cũ!' | translate">
          <input nz-input type="password" formControlName="oldPassword" [placeholder]="'Mật khẩu cũ' | translate" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="6" nzRequired>{{ 'Mật khẩu mới' | translate }}</nz-form-label>
        <nz-form-control [nzSpan]="14" [nzErrorTip]="passwordErrorTpl">
          <input nz-input type="password" formControlName="newPassword" [placeholder]="'Mật khẩu mới' | translate" />
          <ng-template #passwordErrorTpl let-control>
            <ng-container *ngIf="control.hasError('required')">{{ 'Vui lòng nhập mật khẩu mới!' | translate }}</ng-container>
            <ng-container *ngIf="control.hasError('minlength')">{{ 'Mật khẩu phải có ít nhất 6 ký tự' | translate }}</ng-container>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="6" nzRequired>{{ 'Xác nhận mật khẩu mới' | translate }}</nz-form-label>
        <nz-form-control [nzSpan]="14" [nzErrorTip]="confirmErrorTpl">
          <input nz-input type="password" formControlName="confirmPassword" [placeholder]="'Xác nhận mật khẩu mới' | translate" />
          <ng-template #confirmErrorTpl let-control>
            <ng-container *ngIf="control.hasError('required')">{{ 'Vui lòng xác nhận mật khẩu mới!' | translate }}</ng-container>
            <ng-container *ngIf="control.hasError('confirm')">{{ 'Mật khẩu không khớp' | translate }}</ng-container>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control [nzOffset]="6" [nzSpan]="14">
          <button nz-button nzType="primary" [nzLoading]="loading">{{ 'Lưu' | translate }}</button>
        </nz-form-control>
      </nz-form-item>
    </form>
  </nz-card>
</div>
