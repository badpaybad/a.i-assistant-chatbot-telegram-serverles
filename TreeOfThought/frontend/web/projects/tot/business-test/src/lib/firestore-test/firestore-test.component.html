<nz-page-header nzTitle="Firestore Realtime Notification Test">
</nz-page-header>

<div class="test-content">
  <nz-card nzTitle="Send Command & Wait for Firestore">
    <form nz-form nzLayout="vertical">
      <nz-form-item>
        <nz-form-label>Command Name</nz-form-label>
        <nz-form-control>
          <input nz-input [(ngModel)]="commandName" name="commandName" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>Payload (JSON)</nz-form-label>
        <nz-form-control>
          <textarea nz-input [(ngModel)]="payload" name="payload" [nzAutosize]="{ minRows: 3 }"></textarea>
        </nz-form-control>
      </nz-form-item>
      <tot-button nzType="primary" (click)="sendCommand()" [loading]="loading">
        Send Command
      </tot-button>
    </form>
  </nz-card>

  <tot-table 
    [data]="results" 
    [columns]="resultsColumns" 
    [title]="'Recent Results'" 
    [pageSize]="10"
    [frontPagination]="true"
    style="margin-top: 24px;"
  ></tot-table>

  <ng-template #dateTpl let-data>
    {{ data.time | date:'medium' }}
  </ng-template>

  <ng-template #payloadTpl let-data>
    <pre style="margin: 0; padding: 8px; background: #fafafa; border-radius: 4px; font-size: 12px;">{{ data.data | json }}</pre>
  </ng-template>
</div>
