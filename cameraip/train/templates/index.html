<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Real-time Training Dashboard</title>
    <meta name="description" content="Monitor and evaluate your YOLO model training process in real time.">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            backdrop-filter: blur(12px);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            transition: var(--transition-smooth);
        }

        .status-dot.active {
            background-color: var(--accent-green);
            box-shadow: 0 0 12px var(--accent-green);
            animation: pulse 1.5s infinite alternate;
        }

        .status-dot.idle {
            background-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
        }

        .status-dot.failed {
            background-color: var(--accent-red);
            box-shadow: 0 0 12px var(--accent-red);
        }

        .status-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition-smooth);
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: var(--transition-smooth);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Charts Container */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }

        .chart-wrapper {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            position: relative;
            height: 300px;
        }

        /* Terminal Console */
        .terminal-panel {
            margin-bottom: 2rem;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .terminal-controls {
            display: flex;
            gap: 0.5rem;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .terminal-dot.r { background-color: #ff5f56; }
        .terminal-dot.y { background-color: #ffbd2e; }
        .terminal-dot.g { background-color: #27c93f; }

        .terminal-console {
            background: #090d16;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.25rem;
            height: 350px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.5;
            color: #38bdf8;
            white-space: pre-wrap;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.8);
        }

        /* Custom scrollbar for terminal */
        .terminal-console::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-console::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .terminal-console::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .terminal-console::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Results media gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .gallery-card {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .gallery-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-blue);
        }

        .gallery-card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #090d16;
            display: block;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gallery-label {
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-btn-zoom {
            background: transparent;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Lightbox modal */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>YOLO Live Training Dashboard</h1>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Real-time transfer learning & evaluation dashboard</p>
        </div>
        <div class="status-container" id="statusContainer">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Checking status...</span>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- Configuration Panel -->
        <div class="glass-panel">
            <div class="panel-title">Training Config</div>
            <form id="configForm">
                <div class="form-group">
                    <label for="modelSelect">Pretrained Model</label>
                    <select id="modelSelect">
                        <option value="yolov8m.pt" selected>YOLOv8 Medium (Default, Recommended)</option>
                        <option value="yolov8n.pt">YOLOv8 Nano (Fastest, Light)</option>
                        <option value="yolov8s.pt">YOLOv8 Small (Accurate)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="epochsInput">Epochs</label>
                    <input type="number" id="epochsInput" value="10" min="1" max="1000">
                </div>
                <div class="form-group">
                    <label for="batchInput">Batch Size</label>
                    <input type="number" id="batchInput" value="8" min="1" max="256">
                </div>
                <div class="form-group">
                    <label for="imgszInput">Image Size (px)</label>
                    <input type="number" id="imgszInput" value="640" min="32" max="1280" step="32">
                </div>
                <div class="form-group">
                    <label for="deviceSelect">Device</label>
                    <select id="deviceSelect">
                        <option value="cpu">CPU (Highly Compatible)</option>
                        <option value="cuda">NVIDIA GPU (CUDA)</option>
                        <option value="amd">AMD GPU (ROCm)</option>
                        <option value="">Auto Detect</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="startBtn">Start Train</button>
                    <button type="button" class="btn btn-secondary" id="stopBtn" disabled>Stop</button>
                </div>
            </form>
        </div>

        <!-- Realtime Charts Panel -->
        <div class="glass-panel">
            <div class="panel-title">Training Metrics (Loss & Accuracy)</div>
            <div class="charts-container">
                <div class="chart-wrapper">
                    <canvas id="lossChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="mapChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal Console Panel -->
    <div class="glass-panel terminal-panel">
        <div class="terminal-header">
            <div class="panel-title" style="border-bottom:none; padding-bottom:0; margin-bottom:0;">Live Console Logs</div>
            <div class="terminal-controls">
                <span class="terminal-dot r"></span>
                <span class="terminal-dot y"></span>
                <span class="terminal-dot g"></span>
            </div>
        </div>
        <div class="terminal-console" id="consoleLogs">Waiting for training process to start...</div>
    </div>

    <!-- Results Media Gallery Panel -->
    <div class="glass-panel">
        <div class="panel-title">Evaluation Output Gallery</div>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="Zoomed view">
    </div>

    <script>
        // Charts Global variables
        let lossChartObj = null;
        let mapChartObj = null;
        
        let pollTimer = null;
        let isTraining = false;

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            checkStatus();
            // Start polling status
            pollTimer = setInterval(checkStatus, 3000);
            
            document.getElementById('configForm').addEventListener('submit', (e) => {
                e.preventDefault();
                startTraining();
            });

            document.getElementById('stopBtn').addEventListener('click', stopTraining);
        });

        function initCharts() {
            const lossCtx = document.getElementById('lossChart').getContext('2d');
            const mapCtx = document.getElementById('mapChart').getContext('2d');

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';

            lossChartObj = new Chart(lossCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Train Box Loss', data: [], borderColor: '#3b82f6', tension: 0.1, fill: false },
                        { label: 'Train Cls Loss', data: [], borderColor: '#60a5fa', tension: 0.1, fill: false },
                        { label: 'Val Box Loss', data: [], borderColor: '#ef4444', tension: 0.1, fill: false },
                        { label: 'Val Cls Loss', data: [], borderColor: '#f87171', tension: 0.1, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'Loss Curves', color: '#f8fafc' }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Epoch' } },
                        y: { title: { display: true, text: 'Loss' } }
                    }
                }
            });

            mapChartObj = new Chart(mapCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'mAP50', data: [], borderColor: '#10b981', tension: 0.1, fill: false },
                        { label: 'mAP50-95', data: [], borderColor: '#34d399', tension: 0.1, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'Accuracy Curves (mAP)', color: '#f8fafc' }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Epoch' } },
                        y: { min: 0, max: 1.0, title: { display: true, text: 'Score' } }
                    }
                }
            });
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                const startBtn = document.getElementById('startBtn');
                const stopBtn = document.getElementById('stopBtn');

                text.textContent = data.status;
                
                if (data.running) {
                    isTraining = true;
                    dot.className = 'status-dot active';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    
                    // Poll logs and metrics more frequently during active training
                    fetchLogs();
                    fetchMetrics();
                } else {
                    isTraining = false;
                    stopBtn.disabled = true;
                    startBtn.disabled = false;
                    
                    if (data.status.includes('Success')) {
                        dot.className = 'status-dot idle';
                        fetchLogs();
                        fetchMetrics();
                        fetchGallery();
                    } else if (data.status.includes('Failed')) {
                        dot.className = 'status-dot failed';
                        fetchLogs();
                    } else {
                        dot.className = 'status-dot';
                    }
                }
            } catch (err) {
                console.error("Failed to connect to status API:", err);
            }
        }

        async function startTraining() {
            const body = {
                model: document.getElementById('modelSelect').value,
                epochs: document.getElementById('epochsInput').value,
                batch: document.getElementById('batchInput').value,
                imgsz: document.getElementById('imgszInput').value,
                device: document.getElementById('deviceSelect').value
            };

            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    checkStatus();
                }
            } catch (err) {
                alert("Failed to start training.");
            }
        }

        async function stopTraining() {
            if (!confirm("Are you sure you want to stop training?")) return;
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                checkStatus();
            } catch (err) {
                alert("Failed to stop training.");
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                const consoleLogs = document.getElementById('consoleLogs');
                if (data.logs) {
                    consoleLogs.textContent = data.logs;
                    // Auto scroll to bottom
                    consoleLogs.scrollTop = consoleLogs.scrollHeight;
                }
            } catch (err) {
                console.error("Failed to fetch logs:", err);
            }
        }

        async function fetchMetrics() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();
                if (data.metrics && data.metrics.length > 0) {
                    const epochs = data.metrics.map(m => m.epoch);
                    
                    // Update loss charts
                    lossChartObj.data.labels = epochs;
                    lossChartObj.data.datasets[0].data = data.metrics.map(m => m.train_box_loss);
                    lossChartObj.data.datasets[1].data = data.metrics.map(m => m.train_cls_loss);
                    lossChartObj.data.datasets[2].data = data.metrics.map(m => m.val_box_loss);
                    lossChartObj.data.datasets[3].data = data.metrics.map(m => m.val_cls_loss);
                    lossChartObj.update();

                    // Update mAP charts
                    mapChartObj.data.labels = epochs;
                    mapChartObj.data.datasets[0].data = data.metrics.map(m => m.mAP50);
                    mapChartObj.data.datasets[1].data = data.metrics.map(m => m.mAP50_95);
                    mapChartObj.update();
                }
            } catch (err) {
                console.error("Failed to fetch metrics:", err);
            }
        }

        async function fetchGallery() {
            try {
                const res = await fetch('/api/runs_files');
                const data = await res.json();
                const grid = document.getElementById('galleryGrid');
                grid.innerHTML = ''; // Clear
                
                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const card = document.createElement('div');
                        card.className = 'gallery-card';
                        
                        // Add cache buster to bypass browser cache
                        const fileUrl = `/runs/detect/train/${file}?t=${new Date().getTime()}`;
                        
                        card.innerHTML = `
                            <img src="${fileUrl}" alt="${file}" onclick="zoomImage('${fileUrl}')">
                            <div class="gallery-label">
                                <span>${file}</span>
                                <button class="gallery-btn-zoom" onclick="zoomImage('${fileUrl}')">Zoom</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p style="color: var(--text-secondary);">No evaluation images available yet. Complete training to view visual results.</p>';
                }
            } catch (err) {
                console.error("Failed to fetch gallery files:", err);
            }
        }

        function zoomImage(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
